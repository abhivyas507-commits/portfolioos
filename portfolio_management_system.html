<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PortfolioOS — Indian Market PMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #1f2d44;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f4ff;
    --text2: #8899bb;
    --text3: #566178;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --teal: #14b8a6;
    --purple: #a855f7;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; min-height:100vh; }
  
  /* Layout */
  .app { display:flex; height:100vh; overflow:hidden; }
  .sidebar { width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .main { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
  
  /* Sidebar */
  .logo { padding:20px 16px 16px; border-bottom:1px solid var(--border); }
  .logo-text { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
  .logo-text span { color:var(--accent); }
  .logo-sub { font-size:10px; color:var(--text3); margin-top:2px; letter-spacing:0.5px; text-transform:uppercase; }
  .nav { flex:1; padding:12px 8px; }
  .nav-section { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; padding:12px 8px 6px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; color:var(--text2); font-size:13px; transition:all 0.15s; margin-bottom:2px; }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { background:rgba(59,130,246,0.15); color:var(--accent); }
  .nav-item svg { width:16px; height:16px; flex-shrink:0; }
  .nav-badge { margin-left:auto; background:var(--accent); color:#fff; font-size:10px; padding:1px 6px; border-radius:10px; }
  .sidebar-footer { padding:12px; border-top:1px solid var(--border); }
  .market-status { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--surface2); border-radius:8px; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .status-text { font-size:11px; color:var(--text2); }
  .status-time { font-size:10px; color:var(--text3); margin-top:1px; }
  
  /* Header */
  .header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--surface); flex-shrink:0; }
  .page-title { font-size:18px; font-weight:600; }
  .page-sub { font-size:12px; color:var(--text3); margin-top:2px; }
  .header-actions { display:flex; align-items:center; gap:10px; }
  
  /* Buttons */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; border:1px solid var(--border2); background:transparent; color:var(--text2); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:var(--font); white-space:nowrap; }
  .btn:hover { background:var(--surface2); color:var(--text); }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-primary:hover { background:#2563eb; border-color:#2563eb; color:#fff; }
  .btn-success { background:rgba(34,197,94,0.15); border-color:rgba(34,197,94,0.3); color:var(--green); }
  .btn-danger { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.3); color:var(--red); }
  .btn svg { width:14px; height:14px; }
  
  /* Content area */
  .content { padding:24px; flex:1; }
  
  /* Cards */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; }
  .card-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .card-title { font-size:13px; font-weight:600; }
  .card-body { padding:18px; }
  
  /* Metric cards */
  .metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
  .metric { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .metric-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .metric-value { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .metric-change { font-size:11px; margin-top:4px; }
  .up { color:var(--green); }
  .down { color:var(--red); }
  .neutral { color:var(--text3); }
  
  /* Grid layouts */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  
  /* Table */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; }
  th { font-size:11px; color:var(--text3); text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }
  td { padding:11px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  
  /* Tabs */
  .tabs { display:flex; gap:2px; padding:4px; background:var(--surface2); border-radius:10px; margin-bottom:20px; }
  .tab { flex:1; padding:7px 12px; border-radius:7px; border:none; background:transparent; color:var(--text3); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:var(--font); }
  .tab.active { background:var(--surface3); color:var(--text); font-weight:500; }
  .tab:hover:not(.active) { color:var(--text2); }
  
  /* Badges */
  .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:500; }
  .badge-blue { background:rgba(59,130,246,0.15); color:#60a5fa; }
  .badge-green { background:rgba(34,197,94,0.15); color:#4ade80; }
  .badge-red { background:rgba(239,68,68,0.12); color:#f87171; }
  .badge-amber { background:rgba(245,158,11,0.15); color:#fbbf24; }
  .badge-purple { background:rgba(168,85,247,0.15); color:#c084fc; }
  .badge-teal { background:rgba(20,184,166,0.15); color:#2dd4bf; }
  
  /* Forms */
  .form-row { display:flex; gap:12px; margin-bottom:14px; }
  .form-group { flex:1; }
  .form-group label { display:block; font-size:11px; color:var(--text3); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
  input, select, textarea { width:100%; padding:8px 12px; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:13px; font-family:var(--font); outline:none; transition:border-color 0.15s; }
  input:focus, select:focus { border-color:var(--accent); }
  select option { background:var(--surface); }
  
  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--surface); border:1px solid var(--border2); border-radius:16px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; }
  .modal-header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-size:15px; font-weight:600; }
  .modal-body { padding:20px; }
  .modal-footer { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
  .close-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:18px; line-height:1; }
  
  /* Alert bar */
  .alert-bar { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); border-radius:8px; padding:10px 14px; display:flex; align-items:center; gap:10px; margin-bottom:16px; font-size:12px; color:var(--amber); }
  
  /* Allocation bars */
  .alloc-bar { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; margin-top:4px; }
  .alloc-fill { height:100%; border-radius:4px; transition:width 0.5s; }
  
  /* Progress ring */
  .ring-wrap { position:relative; display:inline-flex; align-items:center; justify-content:center; }
  .ring-label { position:absolute; text-align:center; }
  
  /* Stock chip */
  .stock-chip { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:12px; font-weight:500; }
  
  /* Tooltip-like info */
  .info-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
  .info-row:last-child { border-bottom:none; }
  .info-key { color:var(--text3); }
  .info-val { font-weight:500; }
  
  /* Tier bar */
  .tier-strip { display:flex; height:6px; border-radius:3px; overflow:hidden; margin-bottom:12px; }
  .tier-blue { background:var(--accent); }
  .tier-teal { background:var(--teal); }
  .tier-purple { background:var(--purple); }
  
  /* Notification toast */
  .toasts { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
  .toast { background:var(--surface2); border:1px solid var(--border2); border-radius:10px; padding:12px 16px; max-width:300px; animation:slideIn 0.2s ease; display:flex; align-items:flex-start; gap:10px; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
  .toast-icon { width:20px; height:20px; border-radius:50%; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; font-size:11px; }
  .toast-green .toast-icon { background:rgba(34,197,94,0.2); color:var(--green); }
  .toast-red .toast-icon { background:rgba(239,68,68,0.15); color:var(--red); }
  .toast-amber .toast-icon { background:rgba(245,158,11,0.15); color:var(--amber); }
  .toast-title { font-size:12px; font-weight:600; }
  .toast-msg { font-size:11px; color:var(--text2); margin-top:2px; }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  
  /* Responsive */
  @media (max-width:768px) {
    .sidebar { width:200px; }
    .grid-2 { grid-template-columns:1fr; }
    .grid-3 { grid-template-columns:1fr 1fr; }
    .metrics-grid { grid-template-columns:repeat(2,1fr); }
    .form-row { flex-direction:column; }
  }
  @media (max-width:540px) {
    .sidebar { display:none; }
    .grid-3 { grid-template-columns:1fr; }
  }
  
  /* Chart containers */
  .chart-wrap { position:relative; width:100%; height:240px; }
  .chart-wrap-sm { position:relative; width:100%; height:180px; }
  
  /* Position card */
  .pos-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; }
  .pos-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .pos-prices { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .pos-price { background:var(--surface); border-radius:6px; padding:6px 8px; text-align:center; }
  .pos-price-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.4px; }
  .pos-price-val { font-size:12px; font-weight:600; margin-top:2px; }
  .price-sl { color:var(--red); }
  .price-hsl { color:#ff6b6b; }
  .price-entry { color:var(--text); }
  .price-ht { color:#52d470; }
  .price-t { color:var(--green); }
  
  /* Alert config */
  .alert-channel { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
  .alert-channel:last-child { border-bottom:none; }
  .toggle { position:relative; width:36px; height:20px; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:var(--surface2); border-radius:10px; cursor:pointer; transition:0.2s; border:1px solid var(--border2); }
  .toggle-slider::before { content:''; position:absolute; width:14px; height:14px; left:2px; top:2px; background:var(--text3); border-radius:50%; transition:0.2s; }
  .toggle input:checked + .toggle-slider { background:rgba(59,130,246,0.2); border-color:var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform:translateX(16px); background:var(--accent); }
  
  /* Section divider */
  .section-title { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text3); margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  
  /* Risk meter */
  .risk-bar { height:10px; background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444); border-radius:5px; position:relative; margin:8px 0 4px; }
  .risk-needle { position:absolute; top:-4px; width:3px; height:18px; background:var(--text); border-radius:2px; transform:translateX(-50%); transition:left 0.5s; }
</style>
</head>

// MARKET STATUS
// ═══════════════════════════════════════════════════════════
function updateMarketStatus() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Kolkata'}));
  const h = ist.getHours(), m = ist.getMinutes(), d = ist.getDay();
  const open = (d >= 1 && d <= 5) && (h > 9 || (h === 9 && m >= 15)) && h < 15 || (h === 15 && m <= 30);
  const dot = document.getElementById('market-dot');
  const txt = document.getElementById('market-text');
  if (dot) dot.style.background = open ? 'var(--green)' : 'var(--red)';
  if (txt) txt.textContent = open ? 'NSE Open' : 'NSE Closed';
  const timeStr = `${ist.getHours().toString().padStart(2,'0')}:${ist.getMinutes().toString().padStart(2,'0')} IST`;
  const timeEl = document.getElementById('market-time');
  if (timeEl) timeEl.textContent = timeStr;
}

// ═══════════════════════════════════════════════════════════
// PRICE SIMULATION (live-like updates)
// ═══════════════════════════════════════════════════════════
function simulatePrices() {
  ['bluechip','midcap','smallcap'].forEach(cat => {
    NSE_STOCKS[cat].forEach(s => {
      const delta = (Math.random() - 0.495) * s.ltp * 0.003;
      s.ltp = Math.max(s.ltp * 0.8, s.ltp + delta);
      s.change += (Math.random() - 0.5) * 0.1;
      s.ltp = parseFloat(s.ltp.toFixed(2));
      s.change = parseFloat(s.change.toFixed(2));
    });
  });
  // Update client positions
  STATE.clients.forEach(c => {
    c.positions.forEach(p => {
      const stock = findStock(p.symbol);
      if (stock) p.ltp = stock.ltp;
      updatePositionStatus(p);
    });
  });
  updateLiveElements();
}

function findStock(sym) {
  for (const cat of ['bluechip','midcap','smallcap']) {
    const s = NSE_STOCKS[cat].find(x => x.sym === sym);
    if (s) return s;
  }
  return null;
}

function updatePositionStatus(p) {
  const pnl = (p.ltp - p.entryPrice) * p.qty;
  const pnlPct = ((p.ltp - p.entryPrice) / p.entryPrice) * 100;
  p.pnl = pnl;
  p.pnlPct = pnlPct;
  
  // Check alerts
  if (!p.alerted) p.alerted = {};
  if (p.ltp <= p.slPrice && !p.alerted.fullSL) {
    p.alerted.fullSL = true;
    showAlert(`🔴 Full SL Hit: ${p.symbol}`, `₹${p.ltp.toFixed(2)} ≤ ₹${p.slPrice.toFixed(2)}`, 'red');
  } else if (p.ltp <= p.halfSlPrice && !p.alerted.halfSL) {
    p.alerted.halfSL = true;
    showAlert(`⚠️ 50% SL: ${p.symbol}`, `₹${p.ltp.toFixed(2)} hit half stop loss`, 'amber');
  } else if (p.ltp >= p.targetPrice && !p.alerted.fullTP) {
    p.alerted.fullTP = true;
    showAlert(`🎯 Full Target: ${p.symbol}`, `₹${p.ltp.toFixed(2)} ≥ ₹${p.targetPrice.toFixed(2)}`, 'green');
  } else if (p.ltp >= p.halfTargetPrice && !p.alerted.halfTP) {
    p.alerted.halfTP = true;
    showAlert(`✅ 50% Target: ${p.symbol}`, `₹${p.ltp.toFixed(2)} hit half target`, 'green');
  }
}

// ═══════════════════════════════════════════════════════════
function showAlert(title, msg, type='green') {
  const c = document.getElementById('toasts');
  const icons = {green:'✓', red:'✕', amber:'!'};
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<div class="toast-icon">${icons[type]||'i'}</div><div><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 5000);
}

function showToast(msg, type='green') { showAlert(msg, '', type); }

// CLIENT CREATION
// ═══════════════════════════════════════════════════════════
function createClient(name, capital, phone, email) {
  const slPct = STATE.defaultSL / 100;
  const tpPct = STATE.defaultTarget / 100;
  
  const bluechipCap = capital * 0.5;
  const midcapCap = capital * 0.3;
  const smallcapCap = capital * 0.2;
  
  const positions = [];
  
  // Auto-select 5 stocks per category
  const bc = NSE_STOCKS.bluechip.slice(0, 5);
  const mc = NSE_STOCKS.midcap.slice(0, 5);
  const sc = NSE_STOCKS.smallcap.slice(0, 5);
  
  [[bc, bluechipCap, 'Bluechip'], [mc, midcapCap, 'Midcap'], [sc, smallcapCap, 'Smallcap']].forEach(([stocks, cap, tier]) => {
    const perStock = cap / stocks.length;
    stocks.forEach(s => {
      const qty = Math.floor(perStock / s.ltp);
      if (qty < 1) return;
      const entry = s.ltp;
      const sl = entry * (1 - slPct);
      const tp = entry * (1 + tpPct);
      positions.push({
        id: Math.random().toString(36).slice(2),
        symbol: s.sym,
        name: s.name,
        tier,
        qty,
        entryPrice: parseFloat(entry.toFixed(2)),
        ltp: entry,
        slPrice: parseFloat(sl.toFixed(2)),
        halfSlPrice: parseFloat((entry - (entry - sl)/2).toFixed(2)),
        targetPrice: parseFloat(tp.toFixed(2)),
        halfTargetPrice: parseFloat((entry + (tp - entry)/2).toFixed(2)),
        pnl: 0, pnlPct: 0,
        status: 'open',
        alerted: {},
        addedAt: new Date().toISOString()
      });
    });
  });
  
  const client = {
    id: STATE.nextClientId++,
    name, capital, phone, email,
    positions,
    createdAt: new Date().toISOString(),
    realizedPnl: 0
  };
  STATE.clients.push(client);
  document.getElementById('client-count-badge').textContent = STATE.clients.length;
  return client;
}

function getClientMetrics(client) {
  const invested = client.positions.reduce((s, p) => s + (p.entryPrice * p.qty), 0);
  const current = client.positions.reduce((s, p) => s + (p.ltp * p.qty), 0);
  const unrealizedPnl = current - invested;
  const totalPnl = unrealizedPnl + client.realizedPnl;
  const returnPct = invested > 0 ? (totalPnl / client.capital) * 100 : 0;
  return { invested, current, unrealizedPnl, realizedPnl: client.realizedPnl, totalPnl, returnPct };
}

function updateLiveElements() {
  // Update any live price elements
  document.querySelectorAll('[data-ltp]').forEach(el => {
    const sym = el.dataset.ltp;
    const s = findStock(sym);
    if (s) el.textContent = `₹${s.ltp.toFixed(2)}`;
  });
  document.querySelectorAll('[data-pnl]').forEach(el => {
    const cid = parseInt(el.dataset.pnl);
    const c = STATE.clients.find(x => x.id === cid);
    if (c) {
      const m = getClientMetrics(c);
      el.textContent = `${m.returnPct >= 0 ? '+' : ''}${m.returnPct.toFixed(2)}%`;
      el.className = m.returnPct >= 0 ? 'up' : 'down';
    }
  });
}

function renderRisk() {
  const allPos = STATE.clients.flatMap(c => c.positions.map(p => ({...p, clientName:c.name})));
  const atRisk = allPos.filter(p => p.ltp <= p.halfSlPrice).length;
  const atTarget = allPos.filter(p => p.ltp >= p.halfTargetPrice).length;
  
  return `
  <div class="header">
    <div>
      <div class="page-title">Risk Monitor</div>
      <div class="page-sub">Live stop loss & target tracking</div>
    </div>
  </div>
  <div class="content">
    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">Positions at Risk</div>
        <div class="metric-value ${atRisk>0?'down':''}">${atRisk}</div>
        <div class="metric-change neutral">Near or below 50% SL</div>
      </div>
      <div class="metric">
        <div class="metric-label">Near Target</div>
        <div class="metric-value ${atTarget>0?'up':''}">${atTarget}</div>
        <div class="metric-change neutral">At or above 50% target</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total Exposure</div>
        <div class="metric-value">₹${formatNum(allPos.reduce((s,p)=>s+p.entryPrice*p.qty,0))}</div>
        <div class="metric-change neutral">Capital at risk</div>
      </div>
      <div class="metric">
        <div class="metric-label">Max Drawdown</div>
        <div class="metric-value down">${allPos.length>0?Math.min(...allPos.map(p=>p.pnlPct)).toFixed(2):0}%</div>
        <div class="metric-change neutral">Worst position</div>
      </div>
    </div>
    
    ${allPos.length === 0 ? `<div style="text-align:center;padding:60px;color:var(--text3)">No positions to monitor</div>` :
    `<div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">Risk Status — All Positions</div></div>
      <div class="table-wrap">
        <table>
          <tr><th>Symbol</th><th>Client</th><th>Entry</th><th>LTP</th><th>SL</th><th>Target</th><th>Status</th><th>P&L%</th></tr>
          ${allPos.map(p => {
            let status = 'Normal';
            let statusClass = 'badge-green';
            if (p.ltp <= p.slPrice) { status = 'SL Hit'; statusClass = 'badge-red'; }
            else if (p.ltp <= p.halfSlPrice) { status = '50% SL'; statusClass = 'badge-red'; }
            else if (p.ltp >= p.targetPrice) { status = 'Target Hit'; statusClass = 'badge-green'; }
            else if (p.ltp >= p.halfTargetPrice) { status = '50% Target'; statusClass = 'badge-teal'; }
            return `<tr>
              <td><strong>${p.symbol}</strong></td>
              <td style="color:var(--text2)">${p.clientName}</td>
              <td>₹${p.entryPrice.toFixed(2)}</td>
              <td data-ltp="${p.symbol}">₹${p.ltp.toFixed(2)}</td>
              <td class="down">₹${p.slPrice.toFixed(2)}</td>
              <td class="up">₹${p.targetPrice.toFixed(2)}</td>
              <td><span class="badge ${statusClass}">${status}</span></td>
              <td class="${p.pnlPct>=0?'up':'down'}">${p.pnlPct>=0?'+':''}${p.pnlPct.toFixed(2)}%</td>
            </tr>`;
          }).join('')}
        </table>
      </div>
    </div>`}
    
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><div class="card-title">Risk Levels by Tier</div></div>
        <div class="card-body">
          ${['Bluechip','Midcap','Smallcap'].map(tier => {
            const ps = allPos.filter(p=>p.tier===tier);
            const avgPnl = ps.length > 0 ? ps.reduce((s,p)=>s+p.pnlPct,0)/ps.length : 0;
            const risk = Math.min(100, Math.abs(Math.min(0, avgPnl) * 10));
            return `
            <div style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
                <span style="color:var(--text2)">${tier} (${ps.length} positions)</span>
                <span class="${avgPnl>=0?'up':'down'}">${avgPnl>=0?'+':''}${avgPnl.toFixed(2)}% avg</span>
              </div>
              <div class="risk-bar"><div class="risk-needle" style="left:${Math.min(95,Math.max(5,50+avgPnl*5))}%"></div></div>
              <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px"><span>High Risk</span><span>Neutral</span><span>Profit</span></div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Alert Conditions</div></div>
        <div class="card-body">
          <div class="info-row"><span class="info-key">50% SL Triggered</span><span class="badge badge-red">${allPos.filter(p=>p.ltp<=p.halfSlPrice).length} positions</span></div>
          <div class="info-row"><span class="info-key">Full SL Triggered</span><span class="badge badge-red">${allPos.filter(p=>p.ltp<=p.slPrice).length} positions</span></div>
          <div class="info-row"><span class="info-key">50% Target Hit</span><span class="badge badge-teal">${allPos.filter(p=>p.ltp>=p.halfTargetPrice&&p.ltp<p.targetPrice).length} positions</span></div>
          <div class="info-row"><span class="info-key">Full Target Hit</span><span class="badge badge-green">${allPos.filter(p=>p.ltp>=p.targetPrice).length} positions</span></div>
          <div style="margin-top:14px;padding:10px;background:var(--surface2);border-radius:8px;font-size:12px">
            <div style="color:var(--text3);margin-bottom:6px">Default Risk Parameters</div>
            <div class="info-row"><span class="info-key">Stop Loss</span><span class="info-val down">${STATE.defaultSL}%</span></div>
            <div class="info-row"><span class="info-key">Target</span><span class="info-val up">${STATE.defaultTarget}%</span></div>
            <div class="info-row"><span class="info-key">Risk:Reward</span><span class="info-val">1:${(STATE.defaultTarget/STATE.defaultSL).toFixed(1)}</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// Track selections
const NC_SELECTED = { bc: [], mc: [], sc: [] };

function ncToggleStock(el, cat) {
  const sym  = el.dataset.sym;
  const ltp  = parseFloat(el.dataset.ltp);
  const list = NC_SELECTED[cat];
  const idx  = list.findIndex(x => x.sym === sym);
  const colors = { bc: 'var(--accent)', mc: 'var(--teal)', sc: 'var(--purple)' };
  const max = 3;

  if (idx >= 0) {
    // Deselect
    list.splice(idx, 1);
    el.style.border = '1px solid var(--border2)';
    el.style.background = 'var(--surface)';
    el.querySelector('span').style.color = '';
  } else {
    if (list.length >= max) {
      showToast(`Max ${max} stocks per category`, 'amber');
      return;
    }
    list.push({ sym, ltp });
    el.style.border = `1px solid ${colors[cat]}`;
    el.style.background = `rgba(59,130,246,0.1)`;
    el.querySelector('span').style.color = colors[cat];
  }

  const countEl = document.getElementById(`${cat}-count`);
  if (countEl) countEl.textContent = list.length;
}

function ncFilterStocks(query) {
  const q = query.toUpperCase();
  document.querySelectorAll('.nc-chip').forEach(chip => {
    const sym = chip.dataset.sym || '';
    chip.style.display = (!q || sym.includes(q)) ? '' : 'none';
  });
}

function submitNewClientCustom() {
  const name    = document.getElementById('nc-name')?.value?.trim();
  const capital = parseFloat(document.getElementById('nc-capital')?.value);
  const phone   = document.getElementById('nc-phone')?.value?.trim();
  const email   = document.getElementById('nc-email')?.value?.trim();

  if (!name)               { showToast('Please enter client name', 'amber'); return; }
  if (!capital || capital < 1000) { showToast('Please enter capital ≥ ₹1,000', 'amber'); return; }

  // Validate selections
  const warn = document.getElementById('selection-warning');
  if (NC_SELECTED.bc.length < 1 || NC_SELECTED.mc.length < 1 || NC_SELECTED.sc.length < 1) {
    // Auto-select top 3 if nothing chosen
    if (NC_SELECTED.bc.length === 0) NC_SELECTED.bc = NSE_STOCKS.bluechip.slice(0,3).map(s=>({sym:s.sym,ltp:s.ltp}));
    if (NC_SELECTED.mc.length === 0) NC_SELECTED.mc = NSE_STOCKS.midcap.slice(0,3).map(s=>({sym:s.sym,ltp:s.ltp}));
    if (NC_SELECTED.sc.length === 0) NC_SELECTED.sc = NSE_STOCKS.smallcap.slice(0,3).map(s=>({sym:s.sym,ltp:s.ltp}));
  }

  STATE.defaultSL     = parseFloat(document.getElementById('nc-sl')?.value) || 3;
  STATE.defaultTarget = parseFloat(document.getElementById('nc-tp')?.value) || 6;

  // Build positions from custom selection
  const slPct = STATE.defaultSL / 100;
  const tpPct = STATE.defaultTarget / 100;
  const allocs = { bc: 0.5, mc: 0.3, sc: 0.2 };
  const tierNames = { bc: 'Bluechip', mc: 'Midcap', sc: 'Smallcap' };
  const positions = [];

  ['bc','mc','sc'].forEach(cat => {
    const stocks = NC_SELECTED[cat];
    const tierCap = capital * allocs[cat];
    const perStock = tierCap / stocks.length;
    stocks.forEach(s => {
      const qty = Math.max(1, Math.floor(perStock / s.ltp));
      const entry = s.ltp;
      const sl   = entry * (1 - slPct);
      const tp   = entry * (1 + tpPct);
      positions.push({
        id: Math.random().toString(36).slice(2),
        symbol: s.sym,
        name: s.sym,
        tier: tierNames[cat],
        qty, entryPrice: parseFloat(entry.toFixed(2)),
        ltp: entry,
        slPrice: parseFloat(sl.toFixed(2)),
        halfSlPrice: parseFloat((entry-(entry-sl)/2).toFixed(2)),
        targetPrice: parseFloat(tp.toFixed(2)),
        halfTargetPrice: parseFloat((entry+(tp-entry)/2).toFixed(2)),
        pnl: 0, pnlPct: 0, status: 'open', alerted: {},
        addedAt: new Date().toISOString()
      });
    });
  });

  const client = {
    id: STATE.nextClientId++,
    name, capital, phone, email,
    positions,
    createdAt: new Date().toISOString(),
    realizedPnl: 0
  };
  STATE.clients.push(client);

  // Reset selections
  NC_SELECTED.bc = []; NC_SELECTED.mc = []; NC_SELECTED.sc = [];

  document.getElementById('client-count-badge').textContent = STATE.clients.length;
  closeModal();
  showToast(`✓ ${name} — ${positions.length} positions created`, 'green');
  renderPage();
}

  if (pnlEl && STATE.clients.length > 0) {
    destroyChart('pnl');
    chartInstances['pnl'] = new Chart(pnlEl, {
      type: 'bar',
      data: {
        labels: STATE.clients.map(c => c.name.split(' ')[0]),
        datasets: [{
          label: 'P&L ₹',
          data: STATE.clients.map(c => getClientMetrics(c).totalPnl),
          backgroundColor: STATE.clients.map(c => getClientMetrics(c).totalPnl >= 0 ? 'rgba(34,197,94,0.6)' : 'rgba(239,68,68,0.5)'),
          borderRadius: 4,
          borderWidth: 0
        }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ticks:{color:'#8899bb',font:{size:11}}}, y:{ticks:{color:'#8899bb',font:{size:11}}} } }
    });
  }
  
  // Portfolio donut
  const doEl = document.getElementById('donutChart');
  if (doEl) {
    destroyChart('donut');
    chartInstances['donut'] = new Chart(doEl, {
      type: 'doughnut',
      data: {
        labels: ['Bluechip','Midcap','Smallcap'],
        datasets: [{ data: [50,30,20], backgroundColor: ['#3b82f6','#14b8a6','#a855f7'], borderWidth: 0 }]
      },
      options: { responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{display:false} } }
    });
  }
  
  // Return chart
  const retEl = document.getElementById('retChart');
  if (retEl) {
    destroyChart('ret');
    const labels = ['Jan','Feb','Mar','Apr','May','Jun'];
    const data = [0, 1.2, 0.8, 2.1, 1.5, 3.4];
    chartInstances['ret'] = new Chart(retEl, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Return %',
          data,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.08)',
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#3b82f6',
          pointRadius: 4,
          borderWidth: 2
        }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{
          x:{ticks:{color:'#8899bb',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
          y:{ticks:{color:'#8899bb',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}}
        }
      }
    });
  }
}

function afterRender() {
  setTimeout(initCharts, 50);
}

function formatNum(n) {
  const num = parseFloat(n) || 0;
  if (Math.abs(num) >= 10000000) return (num/10000000).toFixed(2)+'Cr';
  if (Math.abs(num) >= 100000) return (num/100000).toFixed(2)+'L';
  if (Math.abs(num) >= 1000) return (num/1000).toFixed(1)+'K';
  return num.toFixed(0);
}


// ═══════════════════════════════════════════════════════════
// REAL PRICE FEED — connects to local Python server
// ═══════════════════════════════════════════════════════════
const API_BASE = 'http://localhost:5000';

async function fetchRealPrices() {
  try {
    const res = await fetch(API_BASE + '/api/market/all');
    const data = await res.json();
    const prices = data.prices;
    
    // Update all NSE_STOCKS with real prices
    ['bluechip','midcap','smallcap'].forEach(cat => {
      NSE_STOCKS[cat].forEach(stock => {
        if (prices[stock.sym]) {
          const oldPrice = stock.ltp;
          stock.ltp = prices[stock.sym];
          stock.change = parseFloat(((stock.ltp - oldPrice) / oldPrice * 100).toFixed(2));
        }
      });
    });

    // Update client positions too
    STATE.clients.forEach(client => {
      client.positions.forEach(pos => {
        if (prices[pos.symbol]) {
          pos.ltp = prices[pos.symbol];
          updatePositionStatus(pos);
        }
      });
    });

    // Show connected status
    const dot = document.getElementById('market-dot');
    const txt = document.getElementById('market-text');
    if (dot) dot.style.background = 'var(--green)';
    if (txt) txt.textContent = '🟢 Live NSE Prices';
    
    updateLiveElements();
    console.log('✓ Real prices loaded at', data.updated);
  } catch(e) {
    // Server not running — use simulated prices silently
    console.log('Server offline — using simulated prices');
    const dot = document.getElementById('market-dot');
    if (dot) dot.style.background = 'var(--amber)';
  }
}

// Fetch real prices every 60 seconds
setInterval(fetchRealPrices, 60000);
// Also fetch immediately on load
setTimeout(fetchRealPrices, 2000);
